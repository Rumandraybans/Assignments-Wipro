<h2 class="text-center mb-4">Register</h2>
<form (ngSubmit)="onSubmit()">
  <div class="form-group mb-3">
    <label class="form-label">Username</label>
    <input type="text" name="username" class="form-control" [(ngModel)]="user.username" required placeholder="choose a username">
  </div>
  <div class="form-group mb-3">
    <label class="form-label">Email Address</label>
    <input type="email" name="email" class="form-control" [(ngModel)]="user.email" required placeholder="name@example.com">
  </div>
  <div class="form-group mb-4">
    <label class="form-label">Password</label>
    <input type="password" name="password" class="form-control" [(ngModel)]="user.password" required placeholder="create password">
  </div>

  <div class="d-grid gap-2">
    <button type="submit" class="btn btn-success">Create Account</button>
    <button type="button" class="btn btn-link text-center text-decoration-none" (click)="switchPage.emit('login')">
      Already registered? Login
    </button>
  </div>
</form>

<div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center" role="alert">
  {{ errorMessage }}
</div>
