<div class="container" style="margin-top: 50px;">
  <div class="row justify-content-center">
    <div class="col-md-6 col-sm-8">
      <div class="card shadow p-4">
        <app-login *ngIf="currentPage === 'login'" (switchPage)="currentPage = $event"></app-login>
        <app-register *ngIf="currentPage === 'register'" (switchPage)="currentPage = $event"></app-register>
        <app-dashboard *ngIf="currentPage === 'dashboard'" (switchPage)="currentPage = $event"></app-dashboard>
      </div>
    </div>
  </div>
</div>
