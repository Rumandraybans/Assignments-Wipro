<div class="container">

    <h2>Add Employee</h2>

    <form (ngSubmit)="addEmployee()">

        <input
            type="number"
            placeholder="Employee ID"
            [(ngModel)]="employee.id"
            name="id"
            required
        >

        <input
            type="text"
            placeholder="Employee Name"
            [(ngModel)]="employee.name"
            name="name"
            required
        >

        <input
            type="text"
            placeholder="Department"
            [(ngModel)]="employee.department"
            name="department"
            required
        >

        <input
            type="number"
            placeholder="Salary"
            [(ngModel)]="employee.salary"
            name="salary"
            required
        >

        <input
            type="email"
            placeholder="Email"
            [(ngModel)]="employee.email"
            name="email"
            required
        >

        <button type="submit">
            Add Employee
        </button>

    </form>

</div>
