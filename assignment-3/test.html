<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body>

<div class="container" style="margin-top: 100px;">
    <div class="row">
        <div class="col-md-4 col-md-offset-4">
            <div class="panel panel-default">
                <div class="panel-body">
                    <h2 class="text-center">Login</h2>
                    <br>
                    <form action="#" method="POST">
                        <div class="form-group">
                            <input type="text" class="form-control input-lg" name="username" placeholder="Username" required>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control input-lg" name="password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-warning btn-block btn-lg">LOGIN</button>
                    </form>
                </div>
                <div class="panel-footer text-center">
                    Not a member? <a href="student_registration1.html">Create Account</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
